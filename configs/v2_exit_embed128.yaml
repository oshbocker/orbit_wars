# ExIt capacity A/B — arm A (embed_dim=128, the current default width).
#
# Tests the hypothesis from the deeper-net discussion: capacity should help in
# the ExIt/search-distillation regime (high-quality targets) even though it does
# not help model-free PPO. This arm and v2_exit_embed256.yaml are IDENTICAL except
# model.embed_dim and run_name, share ONE demo cache (embed_dim does not change
# features), and use the same seed — so any win-rate gap is attributable to width.
#
# 2026-06-09: both arms now run with gumbel_search ON (Build 1 shipped: +9.4% vs
# control on every paired seed), so the capacity question is answered in the
# regime we actually ship — Gumbel/Sequential-Halving distillation targets, not
# the old softmax-over-heuristic. Knobs mirror configs/v2_exit_gumbel.yaml;
# net_opponent stays off (Build 2 ungated and ~1000x slower per search record).
run_name: v2_exit_embed128
seed: 42
device: auto
save_dir: outputs/checkpoints
log_dir: outputs/logs
checkpoint_every: 5
opponent: apex

env:
  max_planets: 40
  allocation_threshold: 0.05
  min_ships_to_send: 1
  ship_fractions: [0.25, 0.5, 0.75, 1.0]

model:
  embed_dim: 128            # ◄── the only architectural knob under test
  n_heads: 4
  n_layers: 3
  ff_dim: 256
  planet_feat_dim: 22
  global_feat_dim: 8
  n_fractions: 4

eval:
  eval_every: 5
  eval_games: 15
  eval_opponents: [apex, random]

# BC warm start (clone apex), then improve by search. Shared cache across both
# arms so the demonstration set is byte-identical and collected only once.
imitation:
  enabled: true
  bc_expert: apex
  bc_games: 150
  bc_demo_opponent: random
  bc_epochs: 50
  bc_lr: 0.001
  bc_batch_size: 256
  bc_cache_path: experiments/demos_apex_exit_ab.pkl

exit:
  enabled: true
  iterations: 30
  games_per_iter: 8
  search_depth: 12
  search_candidates: 10
  search_temperature: 1.0
  train_epochs: 4
  train_batch_size: 256
  train_lr: 0.0003
  value_loss_coef: 0.5
  max_grad_norm: 0.5
  dataset_max_iters: 3
  four_player_prob: 0.0
  opponent: apex
  sample_collect: true
  search_workers: 6      # local box has 8 cores; leave 2 for main
  collect_workers: 6     # parallelize the games (collection is the ExIt bottleneck)
  collect_fast_env: true # engine-faithful standalone sim (no Kaggle harness overhead)
  # ── Build 1: Gumbel / Sequential-Halving (the shipping regime, mirrors
  # configs/v2_exit_gumbel.yaml; same in BOTH arms) ──
  gumbel_search: true
  gumbel_sims: 16
  gumbel_top_m: 8
  gumbel_c_visit: 50.0
  gumbel_c_scale: 1.0
  search_seed: 0
  net_opponent: false    # Build 2 ungated + ~1000x slower; keep off in the A/B
