# Default PPO configuration for Orbit Wars.
# Override any value via CLI: --set training.total_timesteps=1000000

env:
  opponent: aggressive        # random | aggressive | self  (self = load latest checkpoint)
  reward_shaping: true
  n_envs: 4                   # parallel training envs

training:
  total_timesteps: 500_000
  # PPO hyperparameters
  learning_rate: 3.0e-4
  n_steps: 512                # rollout length per env before update
  batch_size: 256
  n_epochs: 10
  gamma: 0.995                # high discount for long (500-step) episodes
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01              # entropy bonus — encourages exploration
  vf_coef: 0.5
  max_grad_norm: 0.5
  # Network
  net_arch: [256, 256]        # MLP hidden layer sizes
  device: auto                # auto | cpu | cuda

eval:
  freq: 10_000                # eval every N timesteps
  n_episodes: 20
  opponent: aggressive        # always eval vs aggressive regardless of training opponent

output:
  checkpoint_dir: outputs/checkpoints
  log_dir: outputs/logs
  run_name: ppo_default       # subdirectory name; timestamp appended automatically
