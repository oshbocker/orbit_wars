run_name: v2_exit
seed: 42
device: auto
save_dir: outputs/checkpoints
log_dir: outputs/logs
checkpoint_every: 5
opponent: producer

env:
  max_planets: 40
  allocation_threshold: 0.05
  min_ships_to_send: 1
  ship_fractions: [0.25, 0.5, 0.75, 1.0]

model:
  embed_dim: 128
  n_heads: 4
  n_layers: 3
  ff_dim: 256
  planet_feat_dim: 22
  global_feat_dim: 8
  n_fractions: 4

eval:
  eval_every: 5
  eval_games: 40          # side-alternated + paired seeds (see run_periodic_eval)
  eval_opponents: [producer]
  eval_seed: 20000        # shared with scripts/eval_fast.py -> directly comparable
  eval_workers: 6         # CPU games ~20s each; set to ~vCPU count on Colab

# BC warm start (clone the expert), then improve by search.
imitation:
  enabled: true
  bc_expert: producer
  bc_games: 150
  bc_demo_opponent: random
  bc_epochs: 50
  bc_lr: 0.001
  bc_batch_size: 256
  bc_cache_path: experiments/demos_producer.pkl

exit:
  enabled: true
  iterations: 50
  games_per_iter: 8
  search_depth: 12
  search_candidates: 10
  search_temperature: 1.0
  train_epochs: 4
  train_batch_size: 256
  train_lr: 0.0003
  value_loss_coef: 0.5
  max_grad_norm: 0.5
  dataset_max_iters: 3
  four_player_prob: 0.0
  opponent: producer
  sample_collect: true
  search_workers: 0   # >1 fans the CPU-bound search across processes (set to ~vCPU count on Colab)
