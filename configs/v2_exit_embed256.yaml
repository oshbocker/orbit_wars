# ExIt capacity A/B — arm B (embed_dim=256, 2x width).
#
# IDENTICAL to v2_exit_embed128.yaml except model.embed_dim and run_name. Shares
# the same demo cache (bc_cache_path) and seed so the only difference vs arm A is
# network width. See configs/v2_exit_embed128.yaml for the experiment rationale
# (incl. why gumbel_search is ON in both arms as of 2026-06-09).
run_name: v2_exit_embed256
seed: 42
device: auto
save_dir: outputs/checkpoints
log_dir: outputs/logs
checkpoint_every: 5
opponent: producer

env:
  max_planets: 40
  allocation_threshold: 0.05
  min_ships_to_send: 1
  ship_fractions: [0.25, 0.5, 0.75, 1.0]

model:
  embed_dim: 256            # ◄── 2x arm A; everything else identical
  n_heads: 4
  n_layers: 3
  ff_dim: 256
  planet_feat_dim: 22
  global_feat_dim: 8
  n_fractions: 4

eval:
  eval_every: 5
  eval_games: 15
  eval_opponents: [producer]

imitation:
  enabled: true
  bc_expert: producer
  bc_games: 150
  bc_demo_opponent: random
  bc_epochs: 50
  bc_lr: 0.001
  bc_batch_size: 256
  bc_cache_path: experiments/demos_producer_embed256.pkl

exit:
  enabled: true
  iterations: 30
  games_per_iter: 8
  search_depth: 12
  search_candidates: 10
  search_temperature: 1.0
  train_epochs: 4
  train_batch_size: 256
  train_lr: 0.0003
  value_loss_coef: 0.5
  max_grad_norm: 0.5
  dataset_max_iters: 3
  four_player_prob: 0.0
  opponent: producer
  sample_collect: true
  search_workers: 6
  collect_workers: 6     # parallelize the games (collection is the ExIt bottleneck)
  collect_fast_env: true # engine-faithful standalone sim (no Kaggle harness overhead)
  # ── Build 1: Gumbel / Sequential-Halving (the shipping regime, mirrors
  # configs/v2_exit_gumbel.yaml; same in BOTH arms) ──
  gumbel_search: true
  gumbel_sims: 16
  gumbel_top_m: 8
  gumbel_c_visit: 50.0
  gumbel_c_scale: 1.0
  search_seed: 0
  net_opponent: false    # Build 2 ungated + ~1000x slower; keep off in the A/B
