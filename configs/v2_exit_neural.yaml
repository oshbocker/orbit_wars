# Phase 3 — grounded learned value at search leaves (BLEND, not swap).
#
# Same base-v2 OrbitNet architecture as configs/v2_exit.yaml (embed 128,
# planet_feat_dim 22, n_fractions 4) so it WARM-STARTS from a v2_exit_a100
# checkpoint. Each candidate leaf is scored by a z-scored blend of evaluate_state
# (heuristic) and OrbitNet's value head:
#   score = (1 - value_leaf_blend)*z(heur) + value_leaf_blend*z(neural)
#
# A pure heuristic->neural SWAP (neural_value_leaves: true) collapsed the 77% agent
# before — the value is grounded globally (corr w/ outcome 0.389) but too noisy to
# rank near-equal sibling moves alone. So blend a small weight instead of swapping.
#
# IMPORTANT: only meaningful warm-started from a checkpoint with a TRAINED value
# head (the value grounds via terminal MSE during ExIt). Launch with:
#   python -m v2.exit_train --config configs/v2_exit_neural.yaml \
#       --resume outputs/checkpoints/v2_exit_a100/ckpt_000020.pt
# (--resume loads weights and SKIPS BC pretrain.)
#
# GATE: A/B value_leaf_blend in {0, 0.3, 0.5, 0.7} vs the w=0 control on the SAME
# paired seeds (scripts/eval_fast.py, side-alternated, high n, MULTIPLE seed
# batches — win-rate is seed-variant). Blend must beat w=0 on the same seeds.
run_name: v2_exit_neural
seed: 42
device: auto
save_dir: outputs/checkpoints
log_dir: outputs/logs
checkpoint_every: 5
opponent: apex

env:
  max_planets: 40
  allocation_threshold: 0.05
  min_ships_to_send: 1
  ship_fractions: [0.25, 0.5, 0.75, 1.0]

model:
  embed_dim: 128
  n_heads: 4
  n_layers: 3
  ff_dim: 256
  planet_feat_dim: 22
  global_feat_dim: 8
  n_fractions: 4

eval:
  eval_every: 5
  eval_games: 40          # side-alternated + paired seeds (see run_periodic_eval)
  eval_opponents: [apex, random]
  eval_seed: 20000        # shared with scripts/eval_fast.py -> directly comparable
  eval_workers: 6         # CPU games ~20s each; set to ~vCPU count on Colab

# Warm-started via --resume, so BC is skipped (kept off for clarity).
imitation:
  enabled: false

exit:
  enabled: true
  iterations: 40
  games_per_iter: 8
  search_depth: 12
  search_candidates: 10
  search_temperature: 1.0
  train_epochs: 4
  train_batch_size: 256
  train_lr: 0.0003
  value_loss_coef: 0.5
  max_grad_norm: 0.5
  dataset_max_iters: 3
  four_player_prob: 0.0
  opponent: apex
  sample_collect: true
  search_workers: 6        # parallel CPU search (set ~vCPU count on Colab)
  collect_workers: 6       # parallel game collection (the ExIt bottleneck)
  collect_fast_env: true   # engine-faithful standalone sim (no Kaggle harness)
  # ── Phase 3 blend ──
  neural_value_leaves: false  # false = blend path (not the pure-neural swap that collapsed before)
  value_leaf_blend: 0.3       # A/B {0, 0.3, 0.5, 0.7}; 0 = pure-heuristic control
