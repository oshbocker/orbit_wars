# V4 "ceiling" config — turns on the full V3_STALL_PLAYBOOK (Tiers 0–3).
#
# Builds on v3 (PBRS reward + PFSP pool + BC anchor + pair/comet features) and
# adds, all flag-gated so v2/v3 configs stay byte-identical:
#   Tier 0.1  imitation.coef_floor      persistent BC anchor (no decay-to-zero)
#   Tier 0.2  ppo.rollout_steps: 256    complete-episode rollouts (fix eps≈0)
#   Tier 0.3  ppo.popart                running return normalization (vs symlog)
#   Tier 1.1  ppo.aux_epochs + model.aux_value_head   PPG auxiliary value phase
#   Tier 1.2  model.shot_success_head + ppo.shot_aux_coef   shot validator head
#   Tier 1.3  env.rich_global_features  centrality / best-enemy / in-flight share
#   Tier 2.1  env.requirement_relative_fractions   capture-cost ship sizing
#   Tier 2.2  env.canonical_rotation    symmetric-start canonicalization
#   Tier 2.3  env.timeline_features     defense margin / time-to-flip / reaction race
#   Tier 2.4  env.depletion_feature     from_planet_id depletion flag
#   Tier 2.5  env.stable_enemy_order    stable enemy slot ordering
#   Tier 3.1  ppo.use_batched_env       batched fast_env rollout (throughput)
#   Tier 3.2  (exit) neural_value_leaves  ExIt search w/ neural value (v2.exit_train)
#   Tier 3.3  imitation.bc_replay_path   distill from top-LB replays
#
# Feature dims with everything on:
#   planet_feat_dim = 22 base + 2 comet + 3 timeline + 1 depletion = 28
#   global_feat_dim = 8 base + 4 rich = 12
#
# NOTE: enable flags only as their phase lands; this file is the END-STATE target.

run_name: v4_ceiling
seed: 42
device: auto
save_dir: outputs/checkpoints
log_dir: outputs/logs
checkpoint_every: 50
opponent: apex
alternate_player_sides: true
self_play_update_interval: 50
four_player_prob: 0.0

pfsp_enabled: true
pfsp_apex_min_prob: 0.4
pfsp_pool_size: 5
pfsp_snapshot_every: 50
pfsp_weighting: hard

env:
  max_planets: 40
  ship_fractions: [0.25, 0.5, 0.75, 1.0]
  use_pair_features: true
  pair_feat_dim: 3
  comet_targeting: true
  # v4 representation
  canonical_rotation: true
  timeline_features: true
  depletion_feature: true
  stable_enemy_order: true
  rich_global_features: true
  requirement_relative_fractions: true

model:
  embed_dim: 128
  n_heads: 4
  n_layers: 3
  ff_dim: 256
  planet_feat_dim: 28         # 22 + 2 comet + 3 timeline + 1 depletion
  global_feat_dim: 12         # 8 + 4 rich
  n_fractions: 4
  # v4 heads
  aux_value_head: true
  shot_success_head: true

ppo:
  rollout_steps: 256          # Tier 0.2: complete-episode rollouts
  num_envs: 4
  total_updates: 3000
  epochs: 4
  minibatch_size: 1024
  gamma: 0.997
  gae_lambda: 0.95
  clip_coef: 0.2
  ent_coef: 0.01
  ent_coef_end: 0.0
  vf_coef: 0.5
  lr: 0.0001
  max_grad_norm: 0.5
  num_workers: 0              # PFSP requires sequential (batched env is in-process)
  value_symlog: false        # using PopArt instead
  popart: true               # Tier 0.3
  popart_beta: 0.0003
  aux_epochs: 6              # Tier 1.1 PPG aux value phase
  aux_beta_clone: 1.0
  aux_every: 1
  shot_aux_coef: 0.25        # Tier 1.2
  use_batched_env: true      # Tier 3.1

reward:
  reward_mode: pbrs
  pbrs_gamma: 0.997
  pbrs_prod_weight: 1.0
  pbrs_planet_weight: 0.5
  pbrs_scale: 0.05

eval:
  eval_every: 50
  eval_games: 20
  eval_opponents: [apex, random]

imitation:
  enabled: true
  bc_expert: apex
  bc_games: 300
  bc_demo_opponent: random
  bc_epochs: 60
  bc_lr: 0.001
  bc_batch_size: 1024
  coef_start: 0.5
  coef_decay_updates: 1000
  coef_floor: 0.05           # Tier 0.1: persistent anchor (never fully decays)
  distilled_opponent: false
  bc_cache_path: experiments/demos_apex_v4.pkl   # v4 feature layout differs -> fresh cache
  # bc_replay_path: experiments/replays_topLB.pkl   # Tier 3.3 (enable when prepared)

exit:
  enabled: false             # ExIt is a separate entry point (v2.exit_train)
  neural_value_leaves: true  # Tier 3.2
  use_batched_env: true
  two_player_search: true
  search_depth: 15
  search_candidates: 10
  opponent: apex
