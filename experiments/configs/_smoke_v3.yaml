run_name: smoke_v3
seed: 42
device: cpu
save_dir: /home/aeschbacher/git/orbit_wars/experiments/checkpoints
log_dir: /home/aeschbacher/git/orbit_wars/experiments/logs
checkpoint_every: 999
log_every: 1
opponent: apex
alternate_player_sides: true
self_play_update_interval: 2
pfsp_enabled: true
pfsp_apex_min_prob: 0.4
pfsp_pool_size: 3
pfsp_snapshot_every: 2
env:
  max_planets: 40
  ship_fractions: [0.25, 0.5, 0.75, 1.0]
  use_pair_features: true
  pair_feat_dim: 3
  comet_targeting: true
model:
  embed_dim: 128
  n_heads: 4
  n_layers: 3
  ff_dim: 256
  planet_feat_dim: 24
  n_fractions: 4
ppo:
  rollout_steps: 40
  num_envs: 1
  total_updates: 3
  epochs: 2
  minibatch_size: 256
  gamma: 0.997
  gae_lambda: 0.95
  clip_coef: 0.2
  ent_coef: 0.01
  ent_coef_end: 0.0
  vf_coef: 0.5
  lr: 0.0001
  num_workers: 0
  value_symlog: true
reward:
  reward_mode: pbrs
  pbrs_gamma: 0.997
  pbrs_scale: 0.05
eval:
  eval_every: 999
imitation:
  enabled: false
