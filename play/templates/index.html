<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbit Wars</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <div id="game-area">
      <canvas id="canvas" width="600" height="600"></canvas>
      <div id="step-display">Step: 0 / 498</div>
    </div>
    <div id="panel">
      <h1>Orbit Wars</h1>
      <div id="scores">
        <div class="score you">You: <span id="score-you">0</span></div>
        <div class="score opp">Opp: <span id="score-opp">0</span></div>
      </div>

      <div id="panel-scroll">
        <div id="prompt">Click "New Game" to start.</div>

        <div id="ship-input" class="hidden">
          <label for="ship-count">Ships to send:</label>
          <input type="number" id="ship-count" min="1" value="1">
          <span id="ship-max"></span>
          <button id="btn-send">Send</button>
        </div>

        <h3>Queued Moves</h3>
        <ul id="move-queue"></ul>

        <div id="game-over" class="hidden">
          <h2 id="game-over-text">Game Over</h2>
          <button id="btn-play-again">Play Again</button>
        </div>
      </div>

      <div id="buttons">
        <button id="btn-step" disabled>Step</button>
        <button id="btn-new-game">New Game</button>
        <button id="btn-export">Export Log</button>
      </div>
    </div>
  </div>
  <script src="/static/game.js"></script>
</body>
</html>
